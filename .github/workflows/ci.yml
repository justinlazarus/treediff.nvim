name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libtreediff.dylib
            output: treediff_native.so
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: libtreediff.dylib
            output: treediff_native_x86.so
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libtreediff.so
            output: treediff_native_linux.so

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build native library
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} lib/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: lib/${{ matrix.output }}

  test:
    needs: build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-aarch64-apple-darwin
          path: lib/

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.11.0

      - name: Install nvim-treesitter and parsers
        run: |
          # Clone nvim-treesitter into Neovim's pack directory (start/ = auto-loaded)
          PACK_DIR="${HOME}/.local/share/nvim/site/pack/vendor/start/nvim-treesitter"
          git clone --depth 1 https://github.com/nvim-treesitter/nvim-treesitter.git "${PACK_DIR}"

          # Install parsers one at a time to ensure each succeeds
          for lang in rust lua python javascript c_sharp typescript css json yaml bash html toml sql kotlin tsx xml; do
            nvim --headless -c "TSInstallSync ${lang}" -c 'qall' 2>&1 || echo "Warning: failed to install ${lang} parser"
          done

          # Verify at least rust parser is installed
          ls -la "${PACK_DIR}/parser/" 2>/dev/null || echo "No parser directory found"

      - name: Run diffview tests
        run: nvim --headless -u tests/minimal_init.lua -l tests/test_diffview.lua

      - name: Run parity tests
        run: nvim --headless -u tests/minimal_init.lua -l tests/test_difft_parity.lua

  release:
    if: github.ref == 'refs/heads/master'
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare binaries
        run: |
          cp artifacts/native-aarch64-apple-darwin/treediff_native.so lib/treediff_native.so
          cp artifacts/native-x86_64-apple-darwin/treediff_native_x86.so lib/treediff_native_x86.so
          cp artifacts/native-x86_64-unknown-linux-gnu/treediff_native_linux.so lib/treediff_native_linux.so

      - name: Commit binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/
          git diff --staged --quiet || git commit -m "Update pre-built binaries [ci skip]"
          git push
